services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_URL: http://localhost:8000
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/var/www
      - /var/www/vendor
    command: sh -c "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"
